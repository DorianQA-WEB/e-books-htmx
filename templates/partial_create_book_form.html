                    <form hx-post="{% url 'create_book' %}"
                          hx-target="#book-list"
                          hx-swap="beforeend"
                          hx-on:htmx:after-request="if(event.detail.xhr.status === 200) this.reset()">
                        <div>
                            <div>
                                {{ form.title }}
                            </div>

                            <div>
                                {{ form.author }}
                            </div>

                            <div>
                                {{ form.price }}
                            </div>

                            <div>
                                <!-- Кнопка "Add book" -->
                                <button type="submit" class="disbtn">Add book</button>
                            </div>
                        </div>
                    </form>
