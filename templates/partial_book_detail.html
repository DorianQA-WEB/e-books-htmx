              <tr>
                <!-- Ячейка номера книги -->
                <td>
                  {{ book.id }}
                </td>
                <!-- Ячейка названия книги -->
                <td>
                  {{ book.title|default:"-"}}
                </td>
                <!-- Ячейка автора книги -->
                <td>
                  {{ book.author|default:"-"}}
                </td>
                <!-- Ячейка цены книги -->
                <td>
                  {{ book.price|default:"-"}}
                </td>
                <!-- Ячейка состояния -->
                <td>
                  <!-- Кнопка "Read/Unread" -->
                  <button class="disbtn">
                    {% if book.read %}Read{% else %}Unread{% endif %}
                  </button>
                </td>
                <!--  Ячейка кнопок действия -->
                <td>
                  <!-- Кнопка "Edit" -->
                  <button class="disbtn editbtn"
                          hx-get="{% url 'update_book_details' book.id %}"
                          hx-target="closest tr"
                          hx-swap="outerHTML">
                    Edit
                  </button>
                  <!-- Кнопка "Delete" -->
                  <button class="disbtn"
                          hx-delete="{% url 'delete_book' book.id %}"
                          hx-target="closest tr"
                          hx-swap="outerHTML"
                          hx-confirm="Вы действительно хотите удалить книгу?">
                    Delete
                  </button>
                </td>
              </tr>
