                            <tr>
                                <!-- Ячейка номера книги -->
                                <td>
                                    {{ book.id }}
                                </td>

                                <!-- Ячейка названия книги -->
                                <td>
                                    {{ book.title }}
                                </td>

                                <!-- Ячейка автора книги -->
                                <td>
                                    {{ book.author }}
                                </td>

                                <!-- Ячейка цены книги -->
                                <td>
                                    {{ book.price }}
                                </td>

                                <!-- Ячейка состояния -->
                                <td>
                                <!-- Кнопка "Read/Unread" -->
                                <button class="disbtn" disabled>
                                    {% if book.read %}Read{% else %}Unread{% endif %}
                                </button>
                                </td>

                                <!--  Ячейка кнопок действия -->
                                <td>
                                    <!-- Кнопка "Save" -->
                                    <button class="svcnbtn"
                                            hx-post="{% url 'update_book_details' book.id %}"
                                            hx-target="closest tr"
                                            hx-swap="outerHTML"
                                            hx-include="closest tr">
                                        Save
                                    </button>
                                    <!-- Кнопка "Cancel" -->
                                    <button class="svcnbtn"
                                            hx-get="{% url 'book_detail' book.id %}"
                                            hx-target="closest tr"
                                            hr-swap="outerHTML">
                                        Cancel
                                    </button>
                                </td>
                            </tr>
